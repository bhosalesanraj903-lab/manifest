# R4: production stack for the always-on box.
# Everything restarts unattended (`restart: unless-stopped`) so the platform
# survives a reboot once the Docker daemon itself is enabled at boot
# (systemd unit below, or Docker Desktop "start on login" on a Mac).
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.prod.yml up -d
services:
  airflow:
    image: apache/airflow:3.0.2
    command: standalone
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ../dags:/opt/airflow/dags
      - ..:/opt/airflow/manifest
      - airflow-db:/opt/airflow

  ais-consumer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ais
    restart: unless-stopped   # reconnect logic lives in the consumer; restart covers crashes
    environment:
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY}
    volumes:
      - ../data:/app/data

  pushgateway:
    image: prom/pushgateway:v1.9.0
    restart: unless-stopped
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  airflow-db:
  prom-data:
  grafana-data:
